<!doctype html>
<html>
<head><meta charset="utf-8"><title>kps echo test</title></head>
<body>
  <pre id="status">idle</pre>
  <pre id="result"></pre>
  <script type="module">
    import { dial } from '/kps-client/index.js'

    const statusEl = document.getElementById('status')
    const resultEl = document.getElementById('result')
    const setStatus = s => { statusEl.textContent = s }

    window.runEcho = async function (addr) {
      setStatus('dialing')
      const conn = await dial(addr)
      setStatus('connected')
      const stream = await conn.openStream('echo')
      setStatus('stream-open')

      const text = `hello-${Date.now()}`
      stream.send(text)
      const it = stream[Symbol.asyncIterator]()
      const { value: buf } = await it.next()
      const echoed = new TextDecoder().decode(buf)
      resultEl.textContent = echoed
      setStatus('done')

      await stream.close()
      await conn.close()
      return echoed === text
    }
  </script>
</body>
</html>
